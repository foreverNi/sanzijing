<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三字经故事乐园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    body { background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #fff3e0 100%); min-height: 100vh; }
    .app { min-height: 100vh; display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; padding: 10px 0 20px; }
    .title-wrap { display: inline-flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; }
    .title { font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, #ff6b6b, #ffa500, #32cd32, #1e90ff); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow 6s ease-in-out infinite; letter-spacing: 4px; }
    @keyframes rainbow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .progress { font-size: 1.1rem; color: #666; font-weight: 600; }
    .book-container { flex: 1; display: flex; align-items: center; justify-content: center; gap: 20px; }
    .book { display: flex; gap: 20px; max-width: 1200px; width: 100%; }
    .page { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 30px; min-height: 500px; flex: 1; display: flex; flex-direction: column; }
    .page-left { background: linear-gradient(135deg, #fff9c4 0%, #fff3e0 100%); align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .page-right { background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%); }
    .nav-btn { background: linear-gradient(135deg, #ff6b6b, #ffa500); color: white; border: none; padding: 15px 20px; border-radius: 50px; font-size: 1rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,107,107,0.4); display: flex; align-items: center; gap: 8px; }
    .nav-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(255,107,107,0.6); }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-arrow { font-size: 1.5rem; }
    .scene-wrap { font-size: 10rem; text-align: center; position: relative; z-index: 2; }
    .scene-label { position: absolute; bottom: 20px; background: rgba(255,255,255,0.9); padding: 8px 20px; border-radius: 20px; font-weight: 800; color: #e91e63; font-size: 1rem; letter-spacing: 2px; }
    .verse-card { background: linear-gradient(135deg, #ff6b6b, #ffa500); color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
    .verse-text { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .pinyin { font-size: 1.2rem; opacity: 0.9; font-style: italic; }
    .story-card { flex: 1; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: auto; }
    .story-title { font-size: 1.3rem; font-weight: 800; color: #ff6b6b; margin-bottom: 15px; }
    .story-text { font-size: 1.1rem; line-height: 1.8; color: #555; margin-bottom: 15px; }
    .moral-card { background: linear-gradient(135deg, #fff9c4, #fff3e0); padding: 15px; border-radius: 10px; border-left: 4px solid #ffa500; }
    .moral-label { font-weight: 800; color: #ffa500; display: block; margin-bottom: 5px; }
    .moral-text { color: #666; font-size: 1rem; }
    .audio-controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .audio-btn { flex: 1; min-width: 120px; background: linear-gradient(135deg, #4caf50, #8bc34a); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .audio-btn:hover { transform: scale(1.05); }
    .stop-btn { background: linear-gradient(135deg, #9e9e9e, #757575); }
    .footer { padding: 20px 0; text-align: center; }
    .page-dots { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; max-width: 600px; margin-left: auto; margin-right: auto; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; cursor: pointer; transition: all 0.3s; }
    .dot.active { background: linear-gradient(135deg, #ff6b6b, #ffa500); transform: scale(1.3); }
    .dot:hover { background: #ff6b6b; }
    .hint { color: #999; font-size: 0.9rem; margin-top: 10px; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @media (max-width: 900px) { .book { flex-direction: column; } .page { min-height: 400px; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-wrap">
        <span style="font-size:2rem;">📖</span>
        <h1 class="title">三字经故事乐园</h1>
        <span style="font-size:2rem;">📖</span>
      </div>
      <div class="progress"><span id="pageIndicator">第 1 页 / 共 100 页</span></div>
    </header>
    <main class="book-container">
      <button class="nav-btn prev-btn" id="prevBtn"><span class="btn-arrow">◀</span></button>
      <div class="book">
        <section class="page page-left">
          <div class="scene-wrap" id="sceneWrap">👶</div>
          <div class="scene-label">精彩故事动画</div>
        </section>
        <section class="page page-right">
          <div class="verse-card">
            <div class="verse-text" id="verseText">人之初，性本善</div>
            <div class="pinyin" id="pinyinText">rén zhī chū, xìng běn shàn</div>
          </div>
          <div class="story-card">
            <div class="story-title">故事解说</div>
            <p class="story-text" id="storyText">每个人刚出生的时候，本性都是善良的。</p>
            <div class="moral-card">
              <span class="moral-label">小小启示</span>
              <span class="moral-text" id="moralText">善良是每个人天生就有的</span>
            </div>
          </div>
          <div class="audio-controls">
            <button class="audio-btn" id="playVerseBtn">🔊 读三字经</button>
            <button class="audio-btn" id="playStoryBtn">🎙️ 讲故事</button>
            <button class="audio-btn stop-btn" id="stopBtn">⏹️ 停止</button>
          </div>
        </section>
      </div>
      <button class="nav-btn next-btn" id="nextBtn"><span class="btn-arrow">▶</span></button>
    </main>
    <footer class="footer">
      <div class="page-dots" id="pageDots"></div>
      <div class="hint">← → 方向键翻页 · 点击按钮听故事</div>
    </footer>
  </div>
<script>
const threeCharClassic=[{verse:"人之初，性本善",pinyin:"rén zhī chū, xìng běn shàn",story:"每个人刚出生的时候，本性都是善良的。就像一颗小小的种子，本来都有长成大树的潜力。宝宝刚出生时，心灵纯洁得像一张白纸，充满了对世界的好奇和爱。",moral:"善良是每个人天生就有的",animation:"baby-seed",bgColor:"#FFE8D6",accentColor:"#FF6B6B"},{verse:"性相近，习相远",pinyin:"xìng xiāng jìn, xí xiāng yuǎn",story:"人的本性本来差别不大，但后天的学习和环境会让人变得很不一样。就像两棵同样的小树苗，一棵在阳光雨露下长大，一棵在风吹雨打中生长，长大后就很不同了。所以好的学习环境很重要哦！",moral:"环境和学习改变人生",animation:"two-trees",bgColor:"#D4F1F4",accentColor:"#189AB4"},{verse:"苟不教，性乃迁",pinyin:"gǒu bù jiào, xìng nǎi qiān",story:"如果从小不好好教育，善良的本性就会慢慢改变。就像一块干净的布，如果不经常清洗，就会变脏。所以我们要好好学习，保持善良的心，不要让坏习惯影响我们哦！",moral:"不学习，本性会变坏",animation:"cloth-clean",bgColor:"#FFF2CC",accentColor:"#FFA500"},{verse:"教之道，贵以专",pinyin:"jiào zhī dào, guì yǐ zhuān",story:"教育的方法最重要的是专心致志。就像用放大镜聚焦阳光可以点燃纸一样，专注地做一件事才能成功。小朋友学习的时候要一心一意，不要一边玩一边学哦！",moral:"专心是学习的秘诀",animation:"magnifier",bgColor:"#E8D5FF",accentColor:"#7C3AED"},{verse:"昔孟母，择邻处",pinyin:"xī mèng mǔ, zé lín chǔ",story:"古时候有个叫孟子的人，他的妈妈为了让他有好的学习环境，搬了三次家。第一次住在墓地旁边，孟子就学人哭丧；第二次住在市场旁边，孟子就学人叫卖；第三次搬到学校旁边，孟子终于开始学礼仪读书了。",moral:"好邻居胜过好房子",animation:"mother-move",bgColor:"#FFD6E8",accentColor:"#E91E63"},{verse:"子不学，断机杼",pinyin:"zǐ bù xué, duàn jī zhù",story:"有一天孟子不想读书，跑回家玩。他的母亲正在织布，看到儿子不用功，就把织布机上的线剪断了，对他说：你读书半途而废，就像我剪断的布一样，前功尽弃！孟子听了很惭愧，从此努力学习。",moral:"半途而废最可惜",animation:"loom-cut",bgColor:"#E8F5E9",accentColor:"#43A047"},{verse:"窦燕山，有义方",pinyin:"dòu yān shān, yǒu yì fāng",story:"古时候有个叫窦禹钧的人，住在燕山一带，所以大家叫他窦燕山。他开始时对孩子很溺爱，后来反省自己，改变了教育方法，用正确的道理和家规来教导孩子们。",moral:"教育要有好方法",animation:"teacher-parent",bgColor:"#FFF8E1",accentColor:"#FF8F00"},{verse:"教五子，名俱扬",pinyin:"jiào wǔ zǐ, míng jù yáng",story:"窦燕山教导五个儿子，每个儿子都很优秀，个个金榜题名，名扬四方。他的大儿子考中状元，二儿子考中进士，其他几个儿子也都很有成就。五子登科的故事从此传为佳话。",moral:"五子登科传美名",animation:"five-children",bgColor:"#E3F2FD",accentColor:"#1976D2"},{verse:"养不教，父之过",pinyin:"yǎng bù jiào, fù zhī guò",story:"只生养孩子而不教育，这是父亲的过错。父母不仅要给孩子吃饭穿衣，更重要的是教他做人的道理。父母是孩子的第一任老师，家庭是孩子的第一所学校。",moral:"养育更要教育",animation:"father-teach",bgColor:"#FFECB3",accentColor:"#EF6C00"},{verse:"教不严，师之惰",pinyin:"jiào bù yán, shī zhī duò",story:"如果老师对学生要求不严格，没有认真教学生，那就是老师的懒惰和失职。严师出高徒，严格的教育才能培养出真正的人才。",moral:"老师要严格认真",animation:"teacher-strict",bgColor:"#D1C4E9",accentColor:"#512DA8"},{verse:"子不学，非所宜",pinyin:"zǐ bù xué, fēi suǒ yí",story:"小孩子如果不肯好好学习，是非常不应该的。学习是孩子的本分，就像蜜蜂要采蜜、小鸟要学飞一样。不学习就不懂道理，不懂道理就会做错事。",moral:"学习是孩子的本分",animation:"child-study",bgColor:"#B2EBF2",accentColor:"#00838F"},{verse:"幼不学，老何为",pinyin:"yòu bù xué, lǎo hé wéi",story:"年轻时不努力学习，到老了能有什么作为呢？少壮不努力，老大徒伤悲。学习要趁年轻，小时候记忆力好，学东西快，长大了要用时才不后悔。",moral:"少壮不努力，老大徒伤悲",animation:"young-old",bgColor:"#FFCDD2",accentColor:"#C62828"},{verse:"玉不琢，不成器",pinyin:"yù bù zhuó, bù chéng qì",story:"一块珍贵的玉石，如果不经过雕琢，是不会成为精美的器物的。人也是一样，即使很聪明，也要学习才能成才。",moral:"人才需要雕琢培养",animation:"jade-carve",bgColor:"#C8E6C9",accentColor:"#2E7D32"},{verse:"人不学，不知义",pinyin:"rén bù xué, bù zhī yì",story:"人如果不学习，就不懂得道理，不知道什么是对的，什么是错的。通过读书学习，我们才能明白孝顺、友爱、诚信、礼貌这些人生道理。",moral:"学习让人懂得道理",animation:"book-wisdom",bgColor:"#BBDEFB",accentColor:"#1565C0"},{verse:"为人子，方少时",pinyin:"wéi rén zǐ, fāng shào shí",story:"做子女的，在年少的时候就要开始学习如何做人。父母和老师要从小教孩子礼貌、孝顺、友善。",moral:"年少时就要学做人",animation:"child-grow",bgColor:"#F8BBD0",accentColor:"#AD1457"},{verse:"亲师友，习礼仪",pinyin:"qīn shī yǒu, xí lǐ yí",story:"要亲近良师益友，学习各种礼仪规矩。见到老师要问好，见到长辈要敬礼，和朋友要友善相处。",moral:"亲近良师，学习礼仪",animation:"teacher-friend",bgColor:"#B3E5FC",accentColor:"#0277BD"},{verse:"香九龄，能温席",pinyin:"xiāng jiǔ líng, néng wēn xí",story:"东汉时有个叫黄香的孩子，九岁的时候就非常孝顺。夏天天气热，他用扇子把父母的床铺扇凉；冬天天气冷，他先钻进被窝把席子焐暖，再请父母去睡。",moral:"九岁黄香孝父母",animation:"huangxiang-warm",bgColor:"#FFE0B2",accentColor:"#E65100"},{verse:"孝于亲，所当执",pinyin:"xiào yú qīn, suǒ dāng zhí",story:"孝顺父母是每个人都应该做到的事情，是天经地义的。父母辛辛苦苦把我们养大，我们要从小事做起。",moral:"孝顺父母是天经地义",animation:"filial-piety",bgColor:"#DCEDC8",accentColor:"#558B2F"},{verse:"融四岁，能让梨",pinyin:"róng sì suì, néng ràng lí",story:"东汉末年有个叫孔融的小朋友，四岁时家里来了客人。父亲端出一盘梨让孩子们分，孔融主动挑了最小的，把大梨留给哥哥和弟弟。",moral:"四岁孔融让大梨",animation:"kongrong-pear",bgColor:"#FFF9C4",accentColor:"#F57F17"},{verse:"弟于长，宜先知",pinyin:"dì yú zhǎng, yí xiān zhī",story:"弟弟要尊重哥哥，弟妹要尊敬兄姐，这些道理应该从小就知道。兄弟姐妹之间要和睦相处，有好东西要一起分享。",moral:"兄弟姐妹要友爱",animation:"siblings-love",bgColor:"#D7CCC8",accentColor:"#5D4037"},{verse:"首孝弟，次见闻",pinyin:"shǒu xiào tì, cì jiàn wén",story:"人生最重要的首先是孝顺父母、友爱兄弟，其次才是多读书多见识。先学会做人的根本道理，再去学习知识文化。",moral:"先学做人，再学知识",animation:"priority-first",bgColor:"#F0F4C3",accentColor:"#9E9D24"},{verse:"知某数，识某文",pinyin:"zhī mǒu shǔ, shí mǒu wén",story:"在学习做人道理之后，就要学习数学和文化知识。数数、认字、读书、写字，这些都是基础知识。",moral:"算数识字打基础",animation:"count-read",bgColor:"#E1BEE7",accentColor:"#6A1B9A"},{verse:"一而十，十而百",pinyin:"yī ér shí, shí ér bǎi",story:"数字从一到十是基础，十个十是一百。数学学习要循序渐进，从简单到复杂。",moral:"数字从一到百",animation:"numbers-count",bgColor:"#B2DFDB",accentColor:"#00695C"},{verse:"百而千，千而万",pinyin:"bǎi ér qiān, qiān ér wàn",story:"一百个一百是一万，数字可以无限大。学习也一样，积累知识从少到多，从简单到复杂。",moral:"数字无穷，学无止境",animation:"numbers-infinity",bgColor:"#FFCCBC",accentColor:"#BF360C"},{verse:"三才者，天地人",pinyin:"sān cái zhě, tiān dì rén",story:"古人说的三才，指的是天、地、人三个方面。天上有日月星辰，地上有山川河流草木，人是万物之灵。",moral:"天地人合称三才",animation:"heaven-earth-man",bgColor:"#C5CAE9",accentColor:"#283593"},{verse:"三光者，日月星",pinyin:"sān guāng zhě, rì yuè xīng",story:"天上有三种光源：太阳、月亮和星星。白天太阳给我们光和热，晚上月亮和星星照亮夜空。",moral:"日月星是天空三光",animation:"sun-moon-star",bgColor:"#BBDEFB",accentColor:"#0D47A1"},{verse:"三纲者，君臣义",pinyin:"sān gāng zhě, jūn chén yì",story:"古人讲的三纲是指三种重要关系：君臣之间要有道义。君主爱护臣子，臣子忠于君主。",moral:"君臣之间要有道义",animation:"ruler-subject",bgColor:"#FFECB3",accentColor:"#FF6F00"},{verse:"父子亲，夫妇顺",pinyin:"fù zǐ qīn, fū fù shùn",story:"父子之间要亲爱，父母爱护子女，子女孝顺父母；夫妻之间要和睦相处。家庭是社会的基础，家和万事兴。",moral:"家庭和睦最重要",animation:"family-harmony",bgColor:"#F8BBD0",accentColor:"#D81B60"},{verse:"曰春夏，曰秋冬",pinyin:"yuē chūn xià, yuē qiū dōng",story:"一年分为春夏秋冬四个季节。春天万物复苏，花儿盛开；夏天阳光明媚；秋天硕果累累；冬天白雪皑皑。",moral:"春夏秋冬四季循环",animation:"four-seasons",bgColor:"#C8E6C9",accentColor:"#388E3C"},{verse:"此四时，运不穷",pinyin:"cǐ sì shí, yùn bù qióng",story:"这四个季节循环往复，永远不会停止。就像钟表的指针一样，春去夏来，秋去冬来。",moral:"四季运转永不停",animation:"season-cycle",bgColor:"#B3E5FC",accentColor:"#0288D1"},{verse:"曰南北，曰西东",pinyin:"yuē nán běi, yuē xī dōng",story:"方向有四个：南、北、西、东。太阳升起的地方是东方，太阳落下的地方是西方。看指南针可以找到方向。",moral:"东南西北四方",animation:"four-directions",bgColor:"#E1BEE7",accentColor:"#7B1FA2"},{verse:"此四方，应乎中",pinyin:"cǐ sì fāng, yìng hū zhōng",story:"这四个方向都以中央为基准。没有中央就分不清东南西北。做人也要居中守正，不偏不倚。",moral:"中央是四方的标准",animation:"center-direction",bgColor:"#FFF9C4",accentColor:"#F9A825"},{verse:"曰水火，木金土",pinyin:"yuē shuǐ huǒ, mù jīn tǔ",story:"古人认为世界万物由五种基本元素组成：水、火、木、金、土，叫五行。五行相生相克，很有意思。",moral:"金木水火土是五行",animation:"five-elements",bgColor:"#D7CCC8",accentColor:"#4E342E"},{verse:"此五行，本乎数",pinyin:"cǐ wǔ xíng, běn hū shù",story:"这五行的相生相克，都是根据一定的数理规律来的。古人用五行来解释很多自然现象。",moral:"五行生克有规律",animation:"elements-order",bgColor:"#F0F4C3",accentColor:"#827717"},{verse:"曰仁义，礼智信",pinyin:"yuē rén yì, lǐ zhì xìn",story:"做人要有五种基本品德：仁（爱心）、义（正直）、礼（礼貌）、智（智慧）、信（诚实）。这五种品德是古人说的五常。",moral:"仁义礼智信是五常",animation:"five-virtues",bgColor:"#FFE0B2",accentColor:"#E65100"},{verse:"此五常，不容紊",pinyin:"cǐ wǔ cháng, bù róng wěn",story:"这五种品德是永远不能混乱的，无论什么时代都要遵守。有爱心就会帮助别人，正直就不会做坏事。",moral:"五常不可混乱",animation:"virtues-stable",bgColor:"#DCEDC8",accentColor:"#558B2F"},{verse:"稻粱菽，麦黍稷",pinyin:"dào liáng shū, mài shǔ jì",story:"我们吃的粮食有六种：稻子（大米）、高粱、豆子、麦子（面粉）、小米和黄米。这些都是农民伯伯辛苦种出来的。",moral:"六种粮食养育人",animation:"six-grains",bgColor:"#FFF8E1",accentColor:"#FF8F00"},{verse:"此六谷，人所食",pinyin:"cǐ liù gǔ, rén suǒ shí",story:"这六种谷物是人类的主食。每种粮食都有自己的营养价值，不能挑食哦！",moral:"不挑食才健康",animation:"food-variety",bgColor:"#E1BEE7",accentColor:"#6A1B9A"},{verse:"马牛羊，鸡犬豕",pinyin:"mǎ niú yáng, jī quǎn shǐ",story:"人类饲养的六种家畜是：马、牛、羊、鸡、狗、猪。马可以拉车，牛可以耕田，狗看家护院。",moral:"六畜为人类服务",animation:"six-animals",bgColor:"#CFD8DC",accentColor:"#455A64"},{verse:"此六畜，人所饲",pinyin:"cǐ liù chù, rén suǒ sì",story:"这六种家畜都是人类饲养、为人类服务的。我们要善待动物，它们也是生命。",moral:"饲养动物要善待",animation:"animal-care",bgColor:"#FFCDD2",accentColor:"#C62828"},{verse:"论语者，二十篇",pinyin:"lún yǔ zhě, èr shí piān",story:"《论语》这本书共有二十篇。它记录了孔子和他的学生们的对话，是儒家最重要的经典之一。",moral:"论语是儒家经典",animation:"lunyu-book",bgColor:"#E3F2FD",accentColor:"#1565C0"},{verse:"群弟子，记善言",pinyin:"qún dì zǐ, jì shàn yán",story:"《论语》是孔子的学生们记录老师的好言好语汇编成的书。孔子去世后，弟子们回忆老师平时的教诲记录下来。",moral:"弟子记录老师教诲",animation:"disciples-record",bgColor:"#E8EAF6",accentColor:"#303F9F"},{verse:"孟子者，七篇止",pinyin:"mèng zǐ zhě, qī piān zhǐ",story:"《孟子》这本书共有七篇。孟子是孔子之后的大儒，被称为亚圣。",moral:"孟子七篇讲仁政",animation:"mencius-book",bgColor:"#FFF3E0",accentColor:"#E65100"},{verse:"讲道德，说仁义",pinyin:"jiǎng dào dé, shuō rén yì",story:"孟子这本书主要讲道德和仁义的道理。他认为人性本善，每个人都有同情心、正义感。",moral:"孟子宣扬仁义道德",animation:"moral-teach",bgColor:"#F3E5F5",accentColor:"#6A1B9A"},{verse:"作中庸，子思笔",pinyin:"zuò zhōng yōng, zǐ sī bǐ",story:"《中庸》这本书是子思写的。子思是孔子的孙子，他继承了孔子的思想。中庸的意思是做事不偏不倚。",moral:"子思著作中庸",animation:"zhongyong-book",bgColor:"#FFFDE7",accentColor:"#F57F17"},{verse:"中不偏，庸不易",pinyin:"zhōng bù piān, yōng bú yì",story:"中就是不偏不倚，不偏向任何一方；庸就是不改变，坚守正道。",moral:"中庸之道不偏不倚",animation:"balance-neutral",bgColor:"#E0F2F1",accentColor:"#00695C"},{verse:"作大学，乃曾子",pinyin:"zuò dà xué, nǎi zēng zǐ",story:"《大学》这本书是曾子写的。曾子是孔子的学生，以孝顺闻名。他每天晚上都要反省自己。",moral:"曾子著作大学",animation:"daxue-book",bgColor:"#FCE4EC",accentColor:"#C2185B"},{verse:"自修齐，至平治",pinyin:"zì xiū qí, zhì píng zhì",story:"《大学》讲的是修身、齐家、治国、平天下的道理。先修养好自己的品德，才能管理好家庭；家庭管理好了，才能治理好国家。",moral:"修身齐家治国平天下",animation:"self-govern",bgColor:"#E8D5F8",accentColor:"#6A1B9A"},{verse:"夏有禹，商有汤",pinyin:"xià yǒu yǔ, shāng yǒu tāng",story:"夏朝的开国君主是大禹，商朝的开国君主是商汤。大禹为了治水，三过家门而不入；商汤爱护百姓，是有名的贤君。",moral:"夏禹商汤是开国贤君",animation:"ancient-kings",bgColor:"#D7CCC8",accentColor:"#4E342E"},{verse:"周武王，称三王",pinyin:"zhōu wǔ wáng, chēng sān wáng",story:"周武王灭了商朝，建立了周朝。大禹、商汤、周武王这三位贤明的君主合称为三王。",moral:"三王都是贤明君主",animation:"three-kings",bgColor:"#CFD8DC",accentColor:"#37474F"},{verse:"汤伐夏，国号商",pinyin:"tāng fá xià, guó hào shāng",story:"夏朝最后一个皇帝叫桀，非常残暴。商汤起兵讨伐夏桀，建立了商朝。",moral:"商汤灭夏建商朝",animation:"shang-dynasty",bgColor:"#FFE0B2",accentColor:"#EF6C00"},{verse:"六百载，至纣亡",pinyin:"liù bǎi zǎi, zhì zhòu wáng",story:"商朝延续了六百年，最后一个皇帝叫纣王。纣王和夏桀一样残暴，商朝最终被周武王所灭。",moral:"商朝六百载亡于纣王",animation:"zhou-fall",bgColor:"#B0BEC5",accentColor:"#37474F"},{verse:"周武王，始诛纣",pinyin:"zhōu wǔ wáng, shǐ zhū zhòu",story:"周武王起兵讨伐商纣王，在牧野之战中取得胜利。武王有姜子牙等贤臣辅佐，建立了周朝。",moral:"周武王灭商建周",animation:"zhou-king",bgColor:"#C5E1A5",accentColor:"#33691E"},{verse:"八百载，最长久",pinyin:"bā bǎi zǎi, zuì cháng jiǔ",story:"周朝延续了八百年，是中国历史上最长的朝代。周朝分西周和东周，是中华文化的黄金时代。",moral:"周朝八百年最长久",animation:"zhou-long",bgColor:"#D1C4E9",accentColor:"#4527A0"},{verse:"始春秋，终战国",pinyin:"shǐ chūn qiū, zhōng zhàn guó",story:"周朝后期分为春秋和战国两个时期。这是一个百家争鸣的时代，孔子、孟子等思想家都出现在这个时期。",moral:"春秋战国百家争鸣",animation:"warring-states",bgColor:"#FFCCBC",accentColor:"#BF360C"},{verse:"五霸强，七雄出",pinyin:"wǔ bà qiáng, qī xióng chū",story:"春秋时期有五霸，战国时期有七雄。这些国家之间互相征战，最后秦国统一了中国。",moral:"五霸七雄轮番登场",animation:"warring-seven",bgColor:"#B2EBF2",accentColor:"#00838F"},{verse:"嬴秦氏，始兼并",pinyin:"yíng qín shì, shǐ jiān bìng",story:"秦始皇嬴政统一了六国，建立了中国历史上第一个统一的大帝国。秦始皇统一了文字、货币、度量衡。",moral:"秦始皇统一六国",animation:"qin-unify",bgColor:"#90CAF9",accentColor:"#1565C0"},{verse:"传二世，楚汉争",pinyin:"chuán èr shì, chǔ hàn zhēng",story:"秦朝只传到秦二世就灭亡了。之后是楚汉相争，项羽和刘邦打了四年仗。最后刘邦打败了项羽，建立了汉朝。",moral:"秦亡后楚汉相争",animation:"chu-han",bgColor:"#FFCDD2",accentColor:"#C62828"},{verse:"高祖兴，汉业建",pinyin:"gāo zǔ xīng, hàn yè jiàn",story:"汉高祖刘邦兴起，打败了项羽，建立了汉朝。刘邦善于用人，手下有张良、萧何、韩信三杰。",moral:"刘邦建立汉朝",animation:"han-found",bgColor:"#F8BBD0",accentColor:"#AD1457"},{verse:"至孝平，王莽篡",pinyin:"zhì xiào píng, wáng mǎng cuàn",story:"汉朝传到孝平皇帝时，被大臣王莽篡位了。汉朝后来被刘秀复兴，分为西汉和东汉。",moral:"王莽篡汉建新朝",animation:"wangmang-usurp",bgColor:"#E1BEE7",accentColor:"#6A1B9A"},{verse:"光武兴，为东汉",pinyin:"guāng wǔ xīng, wéi dōng hàn",story:"光武帝刘秀起兵复兴汉朝，建立了东汉。刘秀是刘邦的后代，他文武双全，以柔道治天下。",moral:"刘秀中兴东汉",animation:"eastern-han",bgColor:"#FFF9C4",accentColor:"#F57F17"},{verse:"四百年，终于献",pinyin:"sì bǎi nián, zhōng yú xiàn",story:"西汉和东汉加起来共四百年，最后到汉献帝时灭亡。东汉末年进入了三国时代。",moral:"汉朝四百年亡于献帝",animation:"han-end",bgColor:"#D7CCC8",accentColor:"#5D4037"},{verse:"魏蜀吴，争汉鼎",pinyin:"wèi shǔ wú, zhēng hàn dǐng",story:"三国时期，魏国、蜀国、吴国争夺天下。三国有许多著名故事：桃园三结义、草船借箭、火烧赤壁。",moral:"魏蜀吴三国鼎立",animation:"three-kingdoms",bgColor:"#CFD8DC",accentColor:"#455A64"},{verse:"号三国，迄两晋",pinyin:"hào sān guó, qì liǎng jìn",story:"这一时期号称三国，最终被晋朝统一。三国之后是西晋和东晋两晋时期。",moral:"三国归晋",animation:"three-to-jin",bgColor:"#B2DFDB",accentColor:"#00695C"},{verse:"唐高祖，起义师",pinyin:"táng gāo zǔ, qǐ yì shī",story:"隋朝之后，唐高祖李渊起兵反隋，建立了唐朝。唐太宗开创了贞观之治。",moral:"李渊起兵建唐朝",animation:"tang-found",bgColor:"#FFECB3",accentColor:"#FF6F00"},{verse:"除隋乱，创国基",pinyin:"chú suí luàn, chuàng guó jī",story:"唐高祖平定了隋朝末年的乱世，开创了唐朝的基业。唐朝的首都长安是当时世界上最大、最繁华的城市。",moral:"唐朝国力强盛",animation:"tang-golden",bgColor:"#F8BBD0",accentColor:"#D81B60"},{verse:"二十传，三百载",pinyin:"èr shí chuán, sān bǎi zǎi",story:"唐朝传了二十位皇帝，延续了三百年。唐诗、书法、绘画都在唐朝达到了高峰。",moral:"唐朝传了三百年",animation:"tang-long",bgColor:"#E3F2FD",accentColor:"#1976D2"},{verse:"梁灭之，国乃改",pinyin:"liáng miè zhī, guó nǎi gǎi",story:"唐朝最终被后梁所灭，中国进入了五代十国的混乱时期。",moral:"唐朝灭亡进入五代",animation:"tang-fall",bgColor:"#B0BEC5",accentColor:"#37474F"},{verse:"炎宋兴，受周禅",pinyin:"yán sòng xīng, shòu zhōu shàn",story:"宋太祖赵匡胤黄袍加身，建立了宋朝。宋朝重文轻武，文化高度发达。",moral:"赵匡胤建立宋朝",animation:"song-found",bgColor:"#BBDEFB",accentColor:"#1565C0"},{verse:"十八传，南北混",pinyin:"shí bā chuán, nán běi hùn",story:"宋朝传了十八代皇帝，分为北宋和南宋。岳飞抗金的故事就发生在南宋时期。",moral:"宋朝分南北宋",animation:"song-north-south",bgColor:"#C5E1A5",accentColor:"#558B2F"},{verse:"昔仲尼，师项橐",pinyin:"xī zhòng ní, shī xiàng tuó",story:"从前孔子非常好学，他听说有个叫项橐的小孩很聪明，只有七岁，就虚心拜他为师。",moral:"孔子也拜小孩为师",animation:"confucius-study",bgColor:"#FFF9C4",accentColor:"#F9A825"},{verse:"古圣贤，尚勤学",pinyin:"gǔ shèng xián, shàng qín xué",story:"古代的圣贤孔子尚且这样勤奋好学，我们普通人就更应该努力学习了。",moral:"圣贤都在勤学，何况我们",animation:"ancient-diligent",bgColor:"#FFE0B2",accentColor:"#EF6C00"},{verse:"头悬梁，锥刺股",pinyin:"tóu xuán liáng, zhuī cì gǔ",story:"汉朝有个叫孙敬的人，读书时怕打瞌睡，就把头发系在屋梁上；苏秦用锥子扎自己的大腿。这就是头悬梁锥刺股的故事。",moral:"古人学习非常刻苦",animation:"head-hair",bgColor:"#D7CCC8",accentColor:"#5D4037"},{verse:"彼不教，自勤苦",pinyin:"bǐ bù jiāo, zì qín kǔ",story:"孙敬和苏秦没有人督促他们，是他们自己主动刻苦学习的。学习是自己的事，不能总让父母老师催着学。",moral:"学习要主动自觉",animation:"self-study",bgColor:"#C5E1A5",accentColor:"#33691E"},{verse:"如囊萤，如映雪",pinyin:"rú náng yíng, rú yìng xuě",story:"晋朝有个叫车胤的孩子，家里穷买不起灯油，夏天就抓萤火虫装在纱袋里，借荧光读书；孙康冬天借雪的反光读书。",moral:"贫不失志苦读书",animation:"firefly-snow",bgColor:"#B3E5FC",accentColor:"#0288D1"},{verse:"家虽贫，学不辍",pinyin:"jiā suī pín, xué bú chuò",story:"他们家里虽然贫穷，却从不停止学习。现在我们生活条件好了，有电灯有课本，更应该珍惜机会好好学习。",moral:"贫穷不停止学习",animation:"poor-study",bgColor:"#E1BEE7",accentColor:"#7B1FA2"},{verse:"苏老泉，二十七",pinyin:"sū lǎo quán, èr shí qī",story:"宋朝有个叫苏洵的人（号老泉），二十七岁才开始发愤读书。他年轻时不爱读书，后来觉悟了，终于成了大学问家。",moral:"苏洵二十七岁始发愤",animation:"su-old-study",bgColor:"#FFCDD2",accentColor:"#C62828"},{verse:"始发愤，读书籍",pinyin:"shǐ fā fèn, dú shū jí",story:"苏洵二十七岁才开始发奋读书，后来成了唐宋八大家之一。这个故事告诉我们：学习永远不晚！",moral:"学习永远不嫌晚",animation:"never-too-late",bgColor:"#F8BBD0",accentColor:"#AD1457"},{verse:"若梁灏，八十二",pinyin:"ruò liáng hào, bā shí èr",story:"宋朝有个叫梁灏的人，八十二岁才考中状元。他从年轻时就参加科举考试，年年不中，但从不放弃。",moral:"梁灏八十二岁中状元",animation:"lianghao-old",bgColor:"#FFF9C4",accentColor:"#F57F17"},{verse:"对大廷，魁多士",pinyin:"duì dà tíng, kuí duō shì",story:"梁灏在金銮殿上面对皇帝的提问，对答如流，才华超过了所有年轻的考生。有志不在年高，无志空长百岁。",moral:"年老照样可以成才",animation:"old-success",bgColor:"#BBDEFB",accentColor:"#1565C0"},{verse:"莹八岁，能咏诗",pinyin:"yíng bā suì, néng yǒng shī",story:"北齐有个叫祖莹的孩子，八岁就能吟诗作文。他小时候非常爱读书，后来成了著名的文学家。",moral:"祖莹八岁能吟诗",animation:"zuying-poem",bgColor:"#C8E6C9",accentColor:"#2E7D32"},{verse:"泌七岁，能赋棋",pinyin:"mì qī suì, néng fù qí",story:"唐朝有个叫李泌的孩子，七岁时就写出了关于下棋的文章。他的才华让在场的人都惊叹。",moral:"李泌七岁能写文",animation:"limi-chess",bgColor:"#E1BEE7",accentColor:"#6A1B9A"},{verse:"蔡文姬，能辨琴",pinyin:"cài wén jī, néng biàn qín",story:"东汉有个才女叫蔡文姬，她的父亲蔡邕是著名的音乐家。蔡文姬从小听父亲弹琴，能分辨弹的是什么曲子。",moral:"蔡文姬能辨琴声",animation:"caiwenji-qin",bgColor:"#FFE0B2",accentColor:"#E65100"},{verse:"谢道韫，能咏吟",pinyin:"xiè dào yùn, néng yǒng yín",story:"东晋有个才女叫谢道韫。有一次下雪，她用柳絮比喻雪花，非常优雅。从此咏絮之才就用来称赞才女。",moral:"谢道韫吟诗咏雪",animation:"xiedaoyun-poem",bgColor:"#B3E5FC",accentColor:"#0288D1"},{verse:"彼女子，且聪敏",pinyin:"bǐ nǚ zǐ, qiě cōng mǐn",story:"蔡文姬和谢道韫都是女孩子，都很聪明有才。过去有人说女孩不用读书，这是不对的。",moral:"女孩子也很聪明",animation:"girl-smart",bgColor:"#F8BBD0",accentColor:"#EC407A"},{verse:"尔男子，当自警",pinyin:"ěr nán zǐ, dāng zì jǐng",story:"男孩子看到女孩子这么聪明有才华，更应该警醒自己，努力学习。无论男生女生，都要勤奋学习才能成才。",moral:"男生更要努力",animation:"boy-alert",bgColor:"#BBDEFB",accentColor:"#1565C0"},{verse:"唐刘晏，方七岁",pinyin:"táng liú yàn, fāng qī suì",story:"唐朝有个叫刘晏的孩子，七岁就被推荐为神童，做了专门负责校正书籍的官。唐玄宗非常高兴，当场赐给他进士头衔。",moral:"刘晏七岁当小官",animation:"liuyan-child",bgColor:"#FFF8E1",accentColor:"#FF8F00"},{verse:"举神童，作正字",pinyin:"jǔ shén tóng, zuò zhèng zì",story:"刘晏被举荐为神童，做了校正书籍的官职。他长大后成了唐朝著名的理财大臣。小时候的聪明加上后天的努力，成就了他的一生。",moral:"神童也要努力",animation:"child-official",bgColor:"#DCEDC8",accentColor:"#558B2F"},{verse:"犬守夜，鸡司晨",pinyin:"quǎn shǒu yè, jī sī chén",story:"狗会在夜里看家，公鸡会在早晨报晓。动物都有自己的职责和本领。小小的动物都在为人类做贡献。",moral:"动物都有自己的本领",animation:"dog-rooster",bgColor:"#FFECB3",accentColor:"#FF6F00"},{verse:"苟不学，曷为人",pinyin:"gǒu bù xué, hé wéi rén",story:"如果不学习，没有一技之长，怎么配称作人呢？人之所以为人，就是因为能学习、有智慧。",moral:"不学无术就不配做人",animation:"human-learn",bgColor:"#CFD8DC",accentColor:"#455A64"},{verse:"蚕吐丝，蜂酿蜜",pinyin:"cán tǔ sī, fēng niàng mì",story:"蚕会吐丝，蜜蜂会酿蜜。蚕吃的是桑叶，吐出的是可以做衣服的蚕丝；蜜蜂采的是花蜜，酿出的是甜美的蜂蜜。",moral:"蚕和蜂都为人类服务",animation:"silkworm-bee",bgColor:"#FFF9C4",accentColor:"#F9A825"},{verse:"人不学，不如物",pinyin:"rén bù xué, bù rú wù",story:"人如果不学习，没有本领，还不如这些小动物呢！至少蚕能吐丝、蜂能酿蜜。",moral:"人不学不如小动物",animation:"better-than-animal",bgColor:"#FFCCBC",accentColor:"#BF360C"},{verse:"幼而学，壮而行",pinyin:"yòu ér xué, zhuàng ér xíng",story:"年轻时努力学习知识和本领，长大后就要把学到的知识付诸实践。学习是为了用的，不是为了装门面。",moral:"幼时学习，长大实践",animation:"young-learn",bgColor:"#C5E1A5",accentColor:"#558B2F"},{verse:"上致君，下泽民",pinyin:"shàng zhì jūn, xià zé mín",story:"学好了本领，上可以报效国家，下可以造福百姓。有本领的人可以为社会做贡献。",moral:"报效国家，造福百姓",animation:"serve-country",bgColor:"#BBDEFB",accentColor:"#1565C0"},{verse:"扬名声，显父母",pinyin:"yáng míng shēng, xiǎn fù mǔ",story:"事业有成后，名声传扬，也让父母感到光荣。孩子有出息，是对父母最大的孝顺。",moral:"成功让父母感到光荣",animation:"famous-family",bgColor:"#FFECB3",accentColor:"#FF6F00"},{verse:"光于前，裕于后",pinyin:"guāng yú qián, yù yú hòu",story:"给祖先增添光彩，给后代留下财富。遗产最好不是金钱，而是品德和学问。",moral:"光宗耀祖，造福后代",animation:"honor-ancestors",bgColor:"#F8BBD0",accentColor:"#C2185B"},{verse:"人遗子，金满籯",pinyin:"rén yí zǐ, jīn mǎn yíng",story:"一般人留给子孙后代的是满筐的金银财宝。很多父母拼命赚钱，想给孩子留下很多钱。",moral:"一般人留金钱给子孙",animation:"gold-legacy",bgColor:"#FFF9C4",accentColor:"#F57F17"},{verse:"我教子，惟一经",pinyin:"wǒ jiào zǐ, wéi yī jīng",story:"而三字经的作者王应麟说，他教育子孙只有这一本三字经。授人以鱼不如授人以渔。",moral:"我只教孩子一本经",animation:"classic-legacy",bgColor:"#E1BEE7",accentColor:"#6A1B9A"},{verse:"勤有功，戏无益",pinyin:"qín yǒu gōng, xì wú yì",story:"勤奋学习一定会有收获，贪玩嬉戏是没有好处的。一分耕耘一分收获，勤奋的人每天都在进步。",moral:"勤奋有收获，贪玩没好处",animation:"diligence-play",bgColor:"#C8E6C9",accentColor:"#388E3C"},{verse:"戒之哉，宜勉力",pinyin:"jiè zhī zāi, yí miǎn lì",story:"要以此为戒啊！应该勉励自己，努力学习。这是三字经的最后两句，也是对所有读者的忠告。",moral:"要以此为戒，努力学习",animation:"final-warning",bgColor:"#FFE0B2",accentColor:"#E65100"}];
const sceneEmojis={babySeed:"👶",twoTrees:"🌳",clothClean:"📄",magnifier:"🔍",motherMove:"🏠",loomCut:"✂️",teacherParent:"👨‍👦",fiveChildren:"🏆",fatherTeach:"👨‍👦",teacherStrict:"👩‍🏫",childStudy:"👦",youngOld:"👦",jadeCarve:"💎",bookWisdom:"📖",childGrow:"🌱",teacherFriend:"👨‍🏫",huangxiangWarm:"🛏️",filialPiety:"🙇",kongrongPear:"🍐",siblingsLove:"❤️",priorityFirst:"🙇",countRead:"📚",numbersCount:"🔢",numbersInfinity:"♾️",heavenEarthMan:"🌍",sunMoonStar:"⭐",rulerSubject:"👑",familyHarmony:"👨‍👩‍👦",fourSeasons:"🌸",seasonCycle:"🔄",fourDirections:"⬆️",centerDirection:"🎯",fiveElements:"💧",elementsOrder:"🔄",fiveVirtues:"❤️",virtuesStable:"📿",sixGrains:"🌾",foodVariety:"🍚",sixAnimals:"🐴",animalCare:"🐕",lunyuBook:"📜",disciplesRecord:"👥",menciusBook:"📜",moralTeach:"⚖️",zhongyongBook:"📜",balanceNeutral:"⚖️",daxueBook:"📜",selfGovern:"🏛️",ancientKings:"👑",threeKings:"👑",shangDynasty:"🏛️",zhouFall:"🔥",zhouKing:"⚔️",zhouLong:"🏛️",warringStates:"⚔️",warringSeven:"🏛️",qinUnify:"🐉",chuHan:"⚔️",hanFound:"🏛️",wangmangUsurp:"👑",easternHan:"🏛️",hanEnd:"⚔️",threeKingdoms:"🏛️",threeToJin:"➡️",tangFound:"🏛️",tangGolden:"🌟",tangLong:"🏛️",tangFall:"🔥",songFound:"🏛️",songNorthSouth:"🏛️",confuciusStudy:"👴",ancientDiligent:"📚",headHair:"📚",selfStudy:"📖",fireflySnow:"✨",poorStudy:"📖",suOldStudy:"👴",neverTooLate:"⏰",lianghaoOld:"🏆",oldSuccess:"👴",zuyingPoem:"👦",limiChess:"👦",caiwenjiQin:"👩",xiedaoyunPoem:"👩",girlSmart:"👩",boyAlert:"👦",liuyanChild:"👦",childOfficial:"📚",dogRooster:"🐕",humanLearn:"👤",silkwormBee:"🐛",betterThanAnimal:"📚",youngLearn:"👦",serveCountry:"🏛️",famousFamily:"👨‍👩‍👦",honorAncestors:"🏆",goldLegacy:"💰",classicLegacy:"📜",diligencePlay:"📚",finalWarning:"⚠️"};
let currentPage=0;const totalPages=threeCharClassic.length;function renderPage(){const data=threeCharClassic[currentPage];document.getElementById('verseText').textContent=data.verse;document.getElementById('pinyinText').textContent=data.pinyin;document.getElementById('storyText').textContent=data.story;document.getElementById('moralText').textContent=data.moral;document.getElementById('pageIndicator').textContent=`第 ${currentPage+1} 页 / 共 ${totalPages} 页`;const sceneWrap=document.getElementById('sceneWrap');const emoji=sceneEmojis[data.animation]||"📖";sceneWrap.innerHTML=`<div style="animation:bounce 2s ease-in-out infinite;font-size:10rem;">${emoji}</div>`;sceneWrap.parentElement.style.background=`linear-gradient(135deg, ${data.bgColor}33 0%, ${data.bgColor}11 100%)`;const dots=document.querySelectorAll('.dot');dots.forEach((dot,i)=>{dot.classList.toggle('active',i===currentPage)});document.getElementById('prevBtn').disabled=currentPage===0;document.getElementById('nextBtn').disabled=currentPage===totalPages-1}function createDots(){const container=document.getElementById('pageDots');container.innerHTML='';for(let i=0;i<totalPages;i++){const dot=document.createElement('div');dot.className='dot'+(i===0?' active':'');dot.onclick=()=>{currentPage=i;renderPage()};container.appendChild(dot)}}document.getElementById('prevBtn').onclick=()=>{if(currentPage>0){currentPage--;renderPage()}};document.getElementById('nextBtn').onclick=()=>{if(currentPage<totalPages-1){currentPage++;renderPage()}};document.onkeydown=e=>{if(e.key==='ArrowLeft'&&currentPage>0){currentPage--;renderPage()}else if(e.key==='ArrowRight'&&currentPage<totalPages-1){currentPage++;renderPage()}};let utterance=null;function stopSpeech(){if(window.speechSynthesis){window.speechSynthesis.cancel()}}document.getElementById('playVerseBtn').onclick=()=>{if(!window.speechSynthesis)return;stopSpeech();const data=threeCharClassic[currentPage];utterance=new SpeechSynthesisUtterance(data.verse);utterance.lang='zh-CN';utterance.rate=0.8;window.speechSynthesis.speak(utterance)};document.getElementById('playStoryBtn').onclick=()=>{if(!window.speechSynthesis)return;stopSpeech();const data=threeCharClassic[currentPage];utterance=new SpeechSynthesisUtterance(data.story);utterance.lang='zh-CN';utterance.rate=0.9;window.speechSynthesis.speak(utterance)};document.getElementById('stopBtn').onclick=stopSpeech;createDots();renderPage();
</script>
